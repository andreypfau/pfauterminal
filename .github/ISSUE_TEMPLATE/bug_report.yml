name: Bug Report
description: Report a bug in pfauterminal
labels: ["bug"]
body:
  - type: textarea
    id: description
    attributes:
      label: Description
      description: A clear description of the bug.
      placeholder: What happened?
    validations:
      required: true

  - type: textarea
    id: steps
    attributes:
      label: Steps to Reproduce
      description: How can we reproduce this?
      placeholder: |
        1. Open pfauterminal
        2. ...
        3. ...
    validations:
      required: true

  - type: textarea
    id: expected
    attributes:
      label: Expected Behavior
      description: What did you expect to happen?
    validations:
      required: true

  - type: textarea
    id: actual
    attributes:
      label: Actual Behavior
      description: What actually happened?
    validations:
      required: true

  - type: dropdown
    id: os
    attributes:
      label: Operating System
      options:
        - Windows
        - macOS
        - Linux
    validations:
      required: true

  - type: input
    id: os-version
    attributes:
      label: OS Version
      placeholder: "e.g. Windows 11 23H2, macOS 15.3, Ubuntu 24.04"
    validations:
      required: false

  - type: input
    id: app-version
    attributes:
      label: pfauterminal Version
      placeholder: "e.g. 0.1"
    validations:
      required: true

  - type: textarea
    id: logs
    attributes:
      label: Logs / Crash Output
      description: If applicable, paste any error messages or crash logs.
      render: text
    validations:
      required: false

  - type: textarea
    id: screenshots
    attributes:
      label: Screenshots / Video
      description: If applicable, add screenshots or screen recordings to help explain the problem.
    validations:
      required: false
